stages:
  - lint
  - test

default:
  image: node:24-bookworm
  tags: [docker]
  timeout: 15m
  retry:
    max: 2
    when:
      - runner_system_failure
      - api_failure
      - stuck_or_timeout_failure
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

cache:
  key: "pnpm-cache"
  paths:
    - node_modules/
  policy: pull-push

lint:
  stage: lint
  interruptible: true
  script:
    - pnpm lint

lint:types:
  stage: lint
  interruptible: true
  script:
    - pnpm dev:prepare
    - pnpm test:types

test:
  stage: test
  interruptible: true
  script:
    - pnpm test

build:
  stage: test
  interruptible: true
  script:
    - pnpm exec nuxt-module-build build
